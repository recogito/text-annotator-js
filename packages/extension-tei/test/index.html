<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>RecogitoJS 3 | TEI</title>
    <link rel="stylesheet" href="CETEIcean.css">
    <script type="module" src="../src/index.ts"></script>
    <style>
      *,
      *:before,
      *:after {
        box-sizing: border-box;
      }

      html,
      body {
        background: #e2e2e2;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: row;
        justify-content: center;
      }

      #content {
        max-width: 800px;
        background-color: #fff;
        padding: 40px;
        border-style: solid;
        border-color: #cfcfcf;
        border-width: 0 1px;
        position: relative;
      }

      #content img {
        max-width: 100%;
      }

      h1 {
        margin: 0;
        padding: 0 0 20px 0;
      }

      p {
        font-size: 17px;
        line-height: 160%;
      }
    </style>

    <style>
      tei-tei * {
        box-sizing: border-box;
      }

      .highlight-element {
        background-color: rgba(0, 0, 0, 0.25);
        border-radius: 2px;
        box-shadow: 0 0 0 1px #F00 !important;
        box-decoration-break: clone !important;
        -webkit-box-decoration-break: clone !important; 
      }
    </style>
  </head>

  <body>
    <div id="content">
    </div>

    <script type="module">
      import CETEI from 'CETEIcean';
      import { createTextAnnotator, rangeToSelector } from '@recogito/text-annotator';
      import { TEIPlugin } from '../src/index.ts';

      import '@recogito/text-annotator/dist/text-annotator.css';

      window.onload = async function () {
        var CETEIcean = new CETEI();

        const container = document.getElementById('content');

        CETEIcean.getHTML5('paradise-lost.xml', data => {
          container.appendChild(data);

          var anno = TEIPlugin(createTextAnnotator(container, {
            annotatingEnabled: false
          }));

          anno.loadAnnotations('annotations.json');

          anno.on('createAnnotation', annotation => {
            console.log('createAnnotation', annotation);
          });

          anno.on('updateAnnotation', (annotation, previous) => {
            console.log('updateAnnotation', annotation);
          });

          anno.on('deleteAnnotation', (annotation) => {
            console.log('deleteAnnotation', annotation);
          });

          anno.on('selectionChanged', (annotations) => {
            console.log('selectionChanged', annotations);
          });

          anno.on('viewportIntersect', (annotations) => {
            console.log('viewport', annotations);
          });


          let currentHighlighted = null;

          let isHovering = false;
          
          // Function to handle mouseover
          document.addEventListener('mouseover', function(e) {
            isHovering = true;
            
            // Remove highlight from previously highlighted element
            if (currentHighlighted) {
              currentHighlighted.classList.remove('highlight-element');
            }
            
            // Add highlight to the current target
            currentHighlighted = e.target;
            currentHighlighted.classList.add('highlight-element');
          });
          
          // Function to handle mouseout (when mouse leaves the document)
          document.addEventListener('mouseout', function(e) {
            if (e.relatedTarget === null) {
              isHovering = false;
              
              // Remove highlight when mouse leaves the document
              if (currentHighlighted) {
                currentHighlighted.classList.remove('highlight-element');
                currentHighlighted = null;
              }
            }
          });

          document.addEventListener('click', function(e) {
            if (!currentHighlighted) return;

            const range = document.createRange();
            range.selectNode(currentHighlighted);

            const selector = rangeToSelector(range, container);
            console.log(selector);

            const id = 'foobar'; // TODO

            anno.state.store.addAnnotation({
              id,
              bodies: [],
              target: {
                annotation: id,
                selector: [selector],
                created: new Date()
              }
            });
          });
    
        });
      };
    </script>

    <script>
      
    </script>
  </body>
</html>
